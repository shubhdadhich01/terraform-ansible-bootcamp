---
- name: Configure Northwind application server
  hosts: app
  become: true

  tasks:
    - name: Update APT package cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install Python
      ansible.builtin.apt:
        name: python3
        state: present

    - name: Create application directory
      ansible.builtin.file:
        path: /opt/northwind-app
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy sample backend application
      ansible.builtin.copy:
        dest: /opt/northwind-app/app.py
        owner: root
        group: root
        mode: "0755"
        content: |
          from http.server import BaseHTTPRequestHandler
          from http.server import HTTPServer
          import json
          import socket

          class RequestHandler(BaseHTTPRequestHandler):
              def do_GET(self):
                  response = {
                      "application": "Northwind Retail",
                      "tier": "application",
                      "server": socket.gethostname(),
                      "status": "healthy"
                  }
                  body = json.dumps(response).encode()
                  self.send_response(200)
                  self.send_header(
                      "Content-Type",
                      "application/json"
                  )
                  self.send_header(
                      "Content-Length",
                      str(len(body))
                  )
                  self.end_headers()
                  self.wfile.write(body)
          server = HTTPServer(
              ("0.0.0.0", 8080),
              RequestHandler
          )
          server.serve_forever()

    - name: Create backend systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/northwind-app.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Northwind Retail Application
          After=network.target

          [Service]
          ExecStart=/usr/bin/python3 /opt/northwind-app/app.py
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start Northwind application
      ansible.builtin.systemd_service:
        name: northwind-app
        state: started
        enabled: true
